version: "3.9"

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: asset_booking
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://app:app@db:5432/asset_booking
      JWT_SECRET: ${JWT_SECRET:-change_me_secret}
      PORT: 3000
      PASSWORD_EXPIRE_DAYS: ${PASSWORD_EXPIRE_DAYS:-90}
      PASSWORD_MIN_LENGTH: ${PASSWORD_MIN_LENGTH:-8}
    depends_on:
      - db
    ports:
      - "3000:3000"
    command: ["npm","run","dev"]

  frontend:
    build: ./frontend
    restart: unless-stopped
    environment:
      VITE_BACKEND_URL: http://backend:3000
    depends_on:
      - backend
    ports:
      - "5173:5173"
    command: ["npm","run","dev","--","--host","0.0.0.0","--port","5173"]

volumes:
  postgres-data:
