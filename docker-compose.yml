version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
      POSTGRES_DB: equipment_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://appuser:apppassword@db:5432/equipment_db
      JWT_SECRET_KEY: change-this-secret-key-in-production
      JWT_EXPIRE_HOURS: 8
    depends_on:
      - db

  nginx:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
